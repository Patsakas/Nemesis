                continue;
            }

            // Allocate a sample buffer (arbitrary size, but large enough for most cases)
            int32_t *samples = (int32_t *)malloc(4096 * sizeof(int32_t));
            if (!samples) {
                WavpackCloseFile(wpc);
                continue;
            }

            // TODO: adapt for target function X (e.g., replace with WavpackGetWrapperData, WavpackSeekSample, etc.)
            uint32_t samples_unpacked = WavpackUnpackSamples(wpc, samples, 4096);
            (void)samples_unpacked; // suppress unused warning

            free(samples);
            WavpackCloseFile(wpc);
        }

