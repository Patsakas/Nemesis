    #include <stdint.h>
    #include <stdlib.h>
    #include <string.h>
    #include <lz4.h>

    __AFL_FUZZ_INIT();

    int main(int argc, char **argv) {
        __AFL_INIT();

        __AFL_LOOP(10000) {
            /* Read fuzz input */
            const uint8_t *input = (const uint8_t *)__AFL_FUZZ_TESTCASE_BUF;
            size_t input_len = (size_t)__AFL_FUZZ_TESTCASE_LEN;

            if (input_len == 0) continue;

            /* Clamp input size to LZ4_MAX_INPUT_SIZE for compression */
            size_t srcSize = input_len > LZ4_MAX_INPUT_SIZE ? LZ4_MAX_INPUT_SIZE : input_len;

            /* Example 1: Compression fuzz target (LZ4_compress_default) */
