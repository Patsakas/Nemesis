       passing to Parse / ParseJson. flatbuffers IDL parsers expect a
       C-string, so allocate `std::string s((const char*)buf, len)` and
       call `s.c_str()` at the call site — NEVER pass __AFL_FUZZ_TESTCASE_BUF
       directly without the null terminator.
    4. Cap input length: `if (len > 65536) continue;` — flatbuffers schemas
       beyond 64KB don't exercise new code paths and slow AFL.
    5. For ParseJson, build a small fixed schema first:
         flatbuffers::Parser parser;
         const char* schema = "table T { x:int; y:string; } root_type T;";
         if (!parser.Parse(schema)) continue;   // schema parse must succeed
         parser.ParseJson(s.c_str());           // FUZZ TARGET — outcome irrelevant
    6. For Parse (schema fuzzing), feed the buffer directly:
         flatbuffers::Parser parser;
         parser.Parse(s.c_str());
    7. Cleanup: parser objects are RAII — destroyed at end of __AFL_LOOP
       scope automatically. Do NOT manually delete.
    8. Compile with `clang++ -std=c++17 -fsanitize=address` (NEMESIS injects
       the actual sanitizer flags via `-fsanitize=…`).
    9. Required #include lines (place at top of harness):
