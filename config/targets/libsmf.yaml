()`, `read_variable_length()`, `write_variable_length()`, `buffer_write_byte()`, `buffer_write_bytes()`, `buffer_read_byte()`, `buffer_read_bytes()`, `tempo_map_add_entry()`.\n\nPROVEN WORKING TEMPLATE:\n```c\n#include <stdint.h>\n#include <stdlib.h>\n#include <smf.h>\n#include <glib.h>\n\n__AFL_FUZZ_INIT();\n\nint main(int argc, char **argv) {\n    __AFL_INIT();\n\n    __AFL_LOOP(10000) {\n        smf_t *smf = smf_load_from_memory(\n            __AFL_FUZZ_TESTCASE_BUF,\n            (int)__AFL_FUZZ_TESTCASE_LEN\n        );\n        \n        if (smf != NULL) {\n            smf_event_t *event;\n            while ((event = smf_get_next_event(smf)) != NULL) {\n                /* TODO: adapt for target function X */\n                /* Example: inspect event->midi_buffer, event->midi_buffer_length */\n                (void)event; /* Silence unused warning */\n            }\n            smf_delete(smf);\n        }\n    }\n    return 0;\n}\n```\n\nOutput ONLY valid JSON with:\n{ \"target_func\": \"function_name\", \"input_format\": \"raw in-memory Standard MIDI File (SMF) binary data\", \"c_code\": \"complete C harness source code using the template above\", \"seed_commands\": [\"midicomp -o seed1.mid /dev/urandom 2>/dev/null || true\", \"python3 -c \\\"import struct; open('seed2.mid','wb').write(b'MThd\\x00\\x00\\x00\\x06\\x00\\x00\\x00\\x01\\x00\\x60MTrk\\x00\\x00\\x00\\x03\\x00\\x90\\x3c\\x64\\x00\\xff\\x2f\\x00')\\\"\"], \"compile_flags\": \"-g -O1 -fno-omit-frame-pointer\" }\n"
