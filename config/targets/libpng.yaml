# Auto-generated by `nemesis onboard`. Review all paths before running.
# Source scanned: $HOME/libpng_clean
# Build system:   cmake

fuzzing:
  timeout_hours: 0.25
  # PNG adapter built on the generic mutator scaffold (mutator_scaffold.h).
  # The adapter parses chunks, fixes CRC32 after mutations, and applies
  # targeted IHDR width/height/bit_depth edge-value mutations to provoke
  # integer-overflow bugs in libpng's row-size computation (e.g. CVE-2018-13785).
  # Combined with AFL's havoc (AFL_CUSTOM_MUTATOR_ONLY=0).
  custom_mutator_source: "nemesis/templates/mutator/adapters/png.c"
target:
  name: libpng
  oss_fuzz_project: libpng
  # Both library and harness compiled with ASAN+UBSan (Fix 135 strict profile).
  # Needed to surface integer-overflow/divide-by-zero bugs (e.g. CVE-2018-13785)
  # which leave no heap-corruption signature ASAN alone would catch.
  sanitizer_profile: asan_ubsan_strict
  source_root: $HOME/libpng_clean
  work_root: $HOME/libpng_work
  build_dir: $HOME/libpng_work/build_fuzz
  debug_build_dir: $HOME/libpng_clean/build_debug
  ubsan_build_dir: $HOME/libpng_clean/build_ubsan
  coverage_build_dir: $HOME/libpng_clean/build_coverage
  build:
    configure: rm -f CMakeCache.txt && CC=afl-clang-fast CXX=afl-clang-fast++ cmake .. -DCMAKE_C_COMPILER=afl-clang-fast -DCMAKE_CXX_COMPILER=afl-clang-fast++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -fsanitize=address,undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer -Wno-error -Wno-unused-variable -Wno-unused-parameter -Wno-uninitialized -Wno-deprecated-declarations" -DBUILD_SHARED_LIBS=OFF -DPNG_SHARED=OFF -DPNG_STATIC=ON -DPNG_TESTS=OFF -DPNG_FRAMEWORK=OFF
    make: make -j$(nproc) png_static
    debug_configure: rm -f CMakeCache.txt && CC=clang CXX=clang++ cmake .. -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address,undefined -fno-omit-frame-pointer -Wno-error -Wno-unused-variable -Wno-unused-parameter -Wno-uninitialized -Wno-deprecated-declarations" -DBUILD_SHARED_LIBS=OFF -DPNG_SHARED=OFF -DPNG_STATIC=ON -DPNG_TESTS=OFF -DPNG_FRAMEWORK=OFF
    debug_make: make -j$(nproc) png_static
    ubsan_configure: rm -f CMakeCache.txt && CC=clang CXX=clang++ cmake .. -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -O1 -fsanitize=undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer -Wno-error -Wno-unused-variable -Wno-unused-parameter -Wno-uninitialized -Wno-deprecated-declarations" -DBUILD_SHARED_LIBS=OFF -DPNG_SHARED=OFF -DPNG_STATIC=ON -DPNG_TESTS=OFF -DPNG_FRAMEWORK=OFF
    ubsan_make: make -j$(nproc) png_static
    coverage_configure: rm -f CMakeCache.txt && CC=clang CXX=clang++ cmake .. -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -O0 -fprofile-instr-generate -fcoverage-mapping -Wno-error -Wno-unused-variable -Wno-unused-parameter -Wno-uninitialized -Wno-deprecated-declarations" -DBUILD_SHARED_LIBS=OFF -DPNG_SHARED=OFF -DPNG_STATIC=ON -DPNG_TESTS=OFF -DPNG_FRAMEWORK=OFF
    coverage_make: make -j$(nproc) png_static
  repro_binary: ''
  repro_args: []
  source_subdir: ''
  include_subdir: ''
  library_name: libpng_static.a
  link_libs: -lz -lm
  harness_includes:
  - png.h
  harness_template: |
    You are a fuzzing engineer generating AFL++ harnesses for libpng (1.6.x).

    libpng has TWO independent reader APIs. Pick exactly ONE — never mix them
    in the same harness. Mixing causes use-after-return on stack-allocated io
    callbacks because the two APIs maintain separate opaque state with
    overlapping cleanup paths.

      A) Streaming API   — png_create_read_struct + png_set_read_fn +
                           png_read_info / png_read_image / png_read_end
                           Use for: png_read_*, png_handle_*, png_set_*,
                           png_process_data, low-level chunk handlers.
      B) Simplified API  — png_image + png_image_begin_read_from_memory +
                           png_image_finish_read
                           Use for: png_image_*, including png_image_read_colormap
                           (reached by setting image.format = PNG_FORMAT_*_COLORMAP).

    CRITICAL RULES (apply to BOTH templates):
    1. Mandatory includes: png.h, stdint.h, stdlib.h, string.h. Streaming API
       additionally needs setjmp.h. NEVER include pngpriv.h or pngstruct.h.
    2. Place __AFL_FUZZ_INIT() at FILE SCOPE after includes. Use
       while (__AFL_LOOP(10000)) {} in main with __AFL_FUZZ_TESTCASE_BUF /
       __AFL_FUZZ_TESTCASE_LEN inside the loop body.
    3. Cap allocations: if PNG_IMAGE_SIZE(image) or computed buffer size
       exceeds 64 MiB, skip the iteration. Prevents harness-induced OOM that
       wastes AFL cycles.
    4. NEVER call: png_init_io, png_read_data, png_crc_read,
       png_read_filter_row, png_read_IDAT_data, png_push_read_chunk,
       png_handle_IHDR, png_handle_PLTE, png_handle_IEND. These are static
       or otherwise unlinkable.
    5. NEVER mix Streaming and Simplified APIs in the same translation unit.
       If the target function is png_image_*, use ONLY Template B.
       If it is anything else (png_read_*, png_handle_*, png_set_*, etc.),
       use ONLY Template A.
    6. Streaming API only: every call that reads bytes must be guarded by
       setjmp(png_jmpbuf(png_ptr)). Simplified API does its own error
       handling — DO NOT add setjmp to Template B.
    7. Reset all per-iteration state at the top of each __AFL_LOOP body.
       Local mem_buf_t / png_image structs MUST be redeclared each iteration.

    TEMPLATE A — STREAMING API (use for png_read_*, png_handle_*, png_set_*):
    ```c
    #include <stdint.h>
    #include <stdlib.h>
    #include <string.h>
    #include <setjmp.h>
    #include <png.h>

    __AFL_FUZZ_INIT();

    typedef struct { const uint8_t *data; size_t size; size_t offset; } mem_buf_t;

    static void mem_read_fn(png_structp png_ptr, png_bytep out, png_size_t len) {
        mem_buf_t *buf = (mem_buf_t *)png_get_io_ptr(png_ptr);
        if (buf->offset + len > buf->size) png_error(png_ptr, "EOF");
        memcpy(out, buf->data + buf->offset, len);
        buf->offset += len;
    }

    int main(int argc, char **argv) {
        (void)argc; (void)argv;
        __AFL_INIT();
        while (__AFL_LOOP(10000)) {
            mem_buf_t input = { __AFL_FUZZ_TESTCASE_BUF, __AFL_FUZZ_TESTCASE_LEN, 0 };
            png_structp png_ptr = png_create_read_struct(PNG_LIBPNG_VER_STRING, NULL, NULL, NULL);
            if (!png_ptr) continue;
            png_infop info_ptr = png_create_info_struct(png_ptr);
            if (!info_ptr) { png_destroy_read_struct(&png_ptr, NULL, NULL); continue; }
            if (setjmp(png_jmpbuf(png_ptr))) {
                png_destroy_read_struct(&png_ptr, &info_ptr, NULL);
                continue;
            }
            png_set_read_fn(png_ptr, (png_voidp)&input, mem_read_fn);
            png_read_info(png_ptr, info_ptr);
            /* TODO: target-specific call here, e.g. png_read_image(png_ptr, rows) */
            png_destroy_read_struct(&png_ptr, &info_ptr, NULL);
        }
        return 0;
    }
    ```

    TEMPLATE B — SIMPLIFIED API (use for png_image_* targets, including
    png_image_read_colormap which is reached by setting a *_COLORMAP format):
    ```c
    #include <stdint.h>
    #include <stdlib.h>
    #include <string.h>
    #include <png.h>

    __AFL_FUZZ_INIT();

    int main(int argc, char **argv) {
        (void)argc; (void)argv;
        __AFL_INIT();
        while (__AFL_LOOP(10000)) {
            const uint8_t *data = __AFL_FUZZ_TESTCASE_BUF;
            size_t size = (size_t)__AFL_FUZZ_TESTCASE_LEN;

            png_image image;
            memset(&image, 0, sizeof(image));
            image.version = PNG_IMAGE_VERSION;

            if (!png_image_begin_read_from_memory(&image, data, size)) {
                png_image_free(&image);
                continue;
            }

            /* Force COLORMAP path so png_image_read_colormap is reached. */
            image.format = PNG_FORMAT_RGB_COLORMAP;

            size_t buf_size = PNG_IMAGE_SIZE(image);
            size_t cmap_size = PNG_IMAGE_COLORMAP_SIZE(image);
            if (buf_size == 0 || buf_size > (64u * 1024u * 1024u)) {
                png_image_free(&image);
                continue;
            }
            png_byte *buffer = (png_byte *)malloc(buf_size);
            png_byte *colormap = (png_byte *)malloc(cmap_size ? cmap_size : 1);
            if (!buffer || !colormap) {
                free(buffer); free(colormap);
                png_image_free(&image);
                continue;
            }
            (void)png_image_finish_read(&image, NULL, buffer, 0, colormap);
            png_image_free(&image);
            free(buffer);
            free(colormap);
        }
        return 0;
    }
    ```

    Output ONLY valid JSON with:
    { "target_func": "function_name", "input_format": "PNG file data (raw bytes)", "c_code": "complete C harness source code — Template A for png_read_*/png_handle_*/png_set_*, Template B for png_image_*", "seed_commands": [], "compile_flags": "-g -O1 -fno-omit-frame-pointer" }
  api_func_fixes: {}
  magic_bytes:
    PNG:
    - "\\x89PNG\r\n\\x1a\n"
  pinned_funcs:
    - func_name: png_check_chunk_length
      file_path: pngrutil.c
      line: 3136
      indirect_reach: true
      # NOTE 2026-05-08: `direct_internal: true` was previously needed as
      # a workaround. Since the audit, pipeline.py:1314-1357 auto-bypasses
      # the post-build profile check when (indirect_reach OR is_static)
      # AND the variant-selection profiler already accepted the harness
      # (coverage_pct ≥ 100). The hack is no longer required.
