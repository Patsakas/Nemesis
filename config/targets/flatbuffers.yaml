    ```c
    #include <flatbuffers/idl.h>
    #include <string>

    __AFL_FUZZ_INIT();

    int main(int argc, char **argv) {
        __AFL_INIT();

        while (__AFL_LOOP(10000)) {
            const uint8_t *buf = __AFL_FUZZ_TESTCASE_BUF;
            size_t len = (size_t)__AFL_FUZZ_TESTCASE_LEN;
            if (len == 0 || len > 65536) continue;

            std::string input((const char*)buf, len);

            flatbuffers::Parser parser;
            const char* schema = "table T { x:int; y:string; } root_type T;";
            if (!parser.Parse(schema)) continue;
            parser.ParseJson(input.c_str());
        }
        return 0;
    }
    ```

