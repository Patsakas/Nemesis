         xmlCleanupParser();\n            continue;\n        }\n\n        doc = xmlCtxtReadMemory(ctxt, (const char *)__AFL_FUZZ_TESTCASE_BUF, \n                                __AFL_FUZZ_TESTCASE_LEN, NULL, NULL, 0);\n        /* TODO: adapt for target function X (e.g., xmlParseDocument, xmlReadMemory) */\n\n        /* Cleanup */\n        if (doc != NULL) xmlFreeDoc(doc);\n        if (ctxt != NULL) xmlFreeParserCtxt(ctxt);\n        xmlCleanupParser();\n    }\n    return 0;\n}\n```\n\nOutput ONLY valid JSON with:\n{ \"target_func\": \"function_name\", \"input_format\": \"XML document or fragment (UTF-8)\", \"c_code\": \"complete C harness source code using the template above\", \"seed_commands\": [\"echo '<root></root>' > seed.xml\", \"xmllint --format seed.xml -o seed2.xml\"], \"compile_flags\": \"-g -O1 -fno-omit-frame-pointer -I/usr/include/libxml2\" }\n"
