# Auto-generated by `nemesis onboard`. Review all paths before running.
# Source scanned: $HOME/cjson_clean
# Build system:   cmake

# CVE-2023-53154 backtest override: keep Introspector "optimal-targets" ranking.
engine:
  auto_discover_limit: 0

fuzzing:
  timeout_hours: 0.25
target:
  name: cjson
  oss_fuzz_project: cjson
  source_root: $HOME/cjson_clean
  work_root: $HOME/cjson_work
  build_dir: $HOME/cjson_work/build_fuzz
  debug_build_dir: $HOME/cjson_clean/build_debug
  # Fix 153: cJSON is self-contained (only -lm linkage) so MSan is realistic
  # without rebuilding deps. Enables `--auto-sanitizer` to consider msan.
  msan_supported: true
  build:
    configure: rm -f CMakeCache.txt && CC=afl-clang-fast CXX=afl-clang-fast++ cmake .. -DCMAKE_C_COMPILER=afl-clang-fast -DCMAKE_CXX_COMPILER=afl-clang-fast++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -fsanitize=address -Wno-error -Wno-unused-variable -Wno-unused-parameter -Wno-uninitialized -Wno-deprecated-declarations" -DBUILD_SHARED_LIBS=OFF
    make: make -j$(nproc) cjson
    debug_configure: rm -f CMakeCache.txt && CC=clang CXX=clang++ cmake .. -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -O1 -fsanitize=address,undefined -fno-omit-frame-pointer -Wno-error -Wno-unused-variable -Wno-unused-parameter -Wno-uninitialized -Wno-deprecated-declarations" -DBUILD_SHARED_LIBS=OFF
    debug_make: make -j$(nproc) cjson
    ubsan_configure: rm -f CMakeCache.txt && CC=clang CXX=clang++ cmake .. -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -O1 -fsanitize=undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer -Wno-error -Wno-unused-variable -Wno-unused-parameter -Wno-uninitialized -Wno-deprecated-declarations" -DBUILD_SHARED_LIBS=OFF
    ubsan_make: make -j$(nproc) cjson
    coverage_configure: rm -f CMakeCache.txt && CC=clang CXX=clang++ cmake .. -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_FLAGS="-g -O0 -fprofile-instr-generate -fcoverage-mapping -Wno-error -Wno-unused-variable -Wno-unused-parameter -Wno-uninitialized -Wno-deprecated-declarations" -DBUILD_SHARED_LIBS=OFF
    coverage_make: make -j$(nproc) cjson
  repro_binary: ''
  repro_args: []
  source_subdir: ''
  include_subdir: ''
  library_name: libcjson.a
  link_libs: -lm
  harness_includes:
  - cJSON.h
  harness_template: |
    You are a fuzzing engineer generating AFL++ harnesses for cJSON.

    CRITICAL RULES:
    1. Feed fuzz input as a raw in-memory buffer (const char * + size_t) to cJSON_ParseWithLength or cJSON_ParseWithLengthOpts.
    2. cJSON operates on raw memory buffers — no FILE* or callbacks required.
    3. Mandatory init/cleanup: cJSON_Parse* returns a cJSON* that MUST be freed with cJSON_Delete to avoid leaks.
    4. Forbidden: Do NOT use cJSON_Parse on non-null-terminated input without length checks — always use length-bounded variants.
    5. Required #include: <cJSON.h> (only public header; no internal headers exist).
    6. AFL++ persistent mode: Place __AFL_FUZZ_INIT(); at FILE SCOPE after includes, before any functions. Use __AFL_FUZZ_TESTCASE_BUF and __AFL_FUZZ_TESTCASE_LEN inside __AFL_LOOP(10000) in main().
    7. Never allocate attacker-controlled sizes (e.g., from input) without bounds — cJSON handles its own allocations internally.
    8. Always check return value of cJSON_Parse* for NULL (parse failure) before using the result.
    9. Do NOT call cJSON_InitHooks unless explicitly testing custom allocators — default malloc/free are sufficient.
    10. Seed inputs must be valid UTF-8 JSON fragments (objects, arrays, strings, numbers, booleans, null).

    FORBIDDEN INTERNAL FUNCTIONS:
    NEVER call these even if you see them used inside the target function source — they will fail to link.

    PROVEN WORKING TEMPLATE:
    ```c
    #include <cJSON.h>
    #include <stdlib.h>

    __AFL_FUZZ_INIT();

    int main(int argc, char **argv) {
        __AFL_INIT();

        __AFL_LOOP(10000) {
            cJSON *json = cJSON_ParseWithLength(
                (const char *)__AFL_FUZZ_TESTCASE_BUF,
                (size_t)__AFL_FUZZ_TESTCASE_LEN
            );
            if (json) {
                /* TODO: adapt for target function X (e.g., cJSON_Print, cJSON_GetObjectItem) */
                char *printed = cJSON_PrintUnformatted(json);
                if (printed) {
                    cJSON_free(printed);
                }
                cJSON_Delete(json);
            }
        }

        return 0;
    }
    ```

    Output ONLY valid JSON with:
    { "target_func": "function_name", "input_format": "JSON text (UTF-8, may be partial/fuzzed)", "c_code": "complete C harness source code using the template above", "seed_commands": ["echo '{"key":"value"}' > seed.json", "echo '[1,2,3]' > seed.json", "echo 'true' > seed.json", "echo 'null' > seed.json", "echo '"string"' > seed.json"], "compile_flags": "-g -O1 -fno-omit-frame-pointer" }
  api_func_fixes: {}
  magic_bytes:
    JSON:
    - '{'
    - '['
    - '"'
    - t
    - f
    - n
  pinned_funcs:
    # CVE-2023-53154 lives in parse_string, reachable via cJSON_ParseWithLength
    # (the with-length variant skips the trailing-NUL safety check that
    # cJSON_Parse performs). The 2026-05-05 successful run found this CVE
    # only after the recon planner moved past cJSON_Parse to this target.
    # Pinning here ensures `--max-targets 1` runs straight to the buggy entry.
    - func_name: cJSON_ParseWithLength
      file_path: cJSON.c
      line: 0
      direct_internal: true
recon_scoring:
  bonus_patterns: {}
  bonus_func_patterns:
    Parse: 15
    Print: 10
    GetObjectItem: 8
    GetArrayItem: 8
    Delete: 5
  penalty_dirs:
  - test
  - tests
  - doc
  - docs
  - man
  penalty_files: []
  penalty_funcs: []
  low_value_files: {}
seeds:
  formats:
    json: $HOME/Nemesis/seeds/json
  oss_fuzz_corpus: $HOME/Nemesis/seeds/oss_fuzz_corpus_cjson
  oss_fuzz_fuzzer_names: []
