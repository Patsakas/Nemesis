        mem_buf_t *buf = (mem_buf_t *)id;
        if (pos < 0 || (size_t)pos > buf->size) return -1;
        buf->offset = (size_t)pos;
        return 0;
    }

    static int mem_set_pos_rel(void *id, int64_t delta, int mode) {
        mem_buf_t *buf = (mem_buf_t *)id;
        int64_t new_pos = buf->offset + delta;
        if (new_pos < 0 || (size_t)new_pos > buf->size) return -1;
        buf->offset = (size_t)new_pos;
        return 0;
    }

