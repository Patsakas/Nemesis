name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # `web` brings in FastAPI/uvicorn, which the API route tests exercise.
      - name: Install
        run: pip install -e ".[dev,web]"

      - name: Test
        run: pytest tests/ -q

  frontend:
    name: dashboard build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      # `npm run build` runs tsc first, so this type-checks as well.
      - name: Type-check and build
        working-directory: frontend
        run: npm run build
