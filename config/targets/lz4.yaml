        #define NM_DST_CAP (1u << 20)
        char *decompressed = (char *)malloc(NM_DST_CAP);
        if (!decompressed) continue;
        int decSize = LZ4_decompress_safe(src, decompressed, srcSize, NM_DST_CAP);
        free(decompressed);
    9. Decompression requires explicit compressedSize (from input) and dstCapacity (upper bound of decompressed size, capped at 1 MiB).
    10. Never call internal helpers like LZ4_compress_generic(), LZ4_compressCtx(), or LZ4_decompress_generic() — they are not part of the public API and may fail to link.

    FORBIDDEN INTERNAL FUNCTIONS:
    NEVER call these even if you see them used inside the target function source — they will fail to link: LZ4_compress_generic(), LZ4_compressCtx(), LZ4_decompress_generic(), LZ4_decompress_safe_partial(), LZ4_compressBound_force(), LZ4_count(), LZ4_wildCopy(), LZ4_hashSequence(), LZ4_hashPosition(), LZ4_renormDictT().

    PROVEN WORKING TEMPLATE:
    ```c
