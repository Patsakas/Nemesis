# Auto-generated by `nemesis onboard`. Review all paths before running.
# Source scanned: $HOME/rpng_clean
# Build system:   cmake
# Language:       C
#
# Oracle expansion candidates (Fix 148-150):
#   TSan candidate:  NO (no pthread/std::thread/OpenMP/_Atomic in source)
#   MSan candidate:  YES (no external link deps that need MSan-rebuild)
#                    → enable: set sanitizer_profile: msan and
#                      msan_supported: true. Run as a SEPARATE campaign;
#                      mutually exclusive with the default ASAN build.
engine:
  # We pin the real decode target below, so don't let auto-discover promote
  # noise like bare `memcpy` calls (libc, not an rpng function) into targets.
  auto_discover_limit: 0
fuzzing:
  timeout_hours: 0.25
target:
  name: rpng
  oss_fuzz_project: ''   # rpng is NOT an OSS-Fuzz project → recon uses local scan
  # Prime decode target: the from-memory PNG parser. Takes a buffer with NO
  # length, so it trusts in-file chunk lengths → OOB-read surface (Fix 139
  # tight heap-copy gives ASAN a bound). The most likely bug class — unchecked
  # width*height allocation + loose chunk-length validation — lives here.
  pinned_funcs:
    - func_name: rpng_load_image_from_memory
      file_path: src/rpng.h
  source_root: $HOME/rpng_clean
  work_root: $HOME/rpng_work
  build_dir: $HOME/rpng_work/build_fuzz
  debug_build_dir: $HOME/rpng_clean/build_debug
  ubsan_build_dir: $HOME/rpng_clean/build_ubsan
  coverage_build_dir: $HOME/rpng_clean/build_coverage
  # rpng is a SINGLE-HEADER library (src/rpng.h, no CMake). We compile its
  # implementation (-DRPNG_IMPLEMENTATION) into librpng.a once per build flavour
  # using the -include trick (no temp .c file). The harness includes rpng.h
  # WITHOUT the define (declarations only) and links librpng.a — the standard
  # NEMESIS flow. `make` is a no-op (archive is done in configure).
  build:
    configure: afl-clang-fast -g -O1 -fsanitize=address -fno-omit-frame-pointer -DRPNG_IMPLEMENTATION -DRPNG_DEFLATE_IMPLEMENTATION -I$HOME/rpng_clean/src -include rpng.h -x c /dev/null -c -o rpng_impl.o && ar rcs librpng.a rpng_impl.o
    make: /bin/true
    debug_configure: clang -g -O0 -fsanitize=address,undefined -fno-sanitize=function,alignment -fno-sanitize-recover=undefined -fno-omit-frame-pointer -DRPNG_IMPLEMENTATION -DRPNG_DEFLATE_IMPLEMENTATION -I$HOME/rpng_clean/src -include rpng.h -x c /dev/null -c -o rpng_impl.o && ar rcs librpng.a rpng_impl.o
    debug_make: /bin/true
    ubsan_configure: clang -g -O0 -fsanitize=undefined -fno-sanitize=function,alignment -fno-sanitize-recover=undefined -fno-omit-frame-pointer -DRPNG_IMPLEMENTATION -DRPNG_DEFLATE_IMPLEMENTATION -I$HOME/rpng_clean/src -include rpng.h -x c /dev/null -c -o rpng_impl.o && ar rcs librpng.a rpng_impl.o
    ubsan_make: /bin/true
    coverage_configure: clang -g -O0 -fprofile-instr-generate -fcoverage-mapping -DRPNG_IMPLEMENTATION -DRPNG_DEFLATE_IMPLEMENTATION -I$HOME/rpng_clean/src -include rpng.h -x c /dev/null -c -o rpng_impl.o && ar rcs librpng.a rpng_impl.o
    coverage_make: /bin/true
  repro_binary: ''
  repro_args: []
  source_subdir: ''
  include_subdir: src
  library_name: librpng.a
  link_libs: -lm
  harness_includes:
  - rpng.h
  harness_template: |
    You are a fuzzing engineer generating AFL++ harnesses for rpng.

    CRITICAL RULES:
    1. Feed fuzz input as raw in-memory PNG buffers (use `rpng_load_image_from_memory`, `rpng_chunk_read_from_memory`, etc.). NEVER use FILE* paths.
    2. The library operates on raw memory buffers (char*). No handle/context object is required for parsing.
    3. Mandatory cleanup: free() any buffer returned by rpng_*_from_memory() or rpng_*_to_memory() functions. These allocate with RPNG_MALLOC (default: malloc).
    4. Forbidden: Do NOT use `load_file_to_buffer`, `save_file_from_buffer`, or any internal helper (e.g., `rpng_inflate_image_data`, `rpng_deflate_image_data`). These are NOT in the public API and will fail to link.
    5. Required includes: #include "rpng.h" (only public header).
    6. AFL++ persistent mode: Place `__AFL_FUZZ_INIT();` at FILE SCOPE after includes. Use `__AFL_LOOP(10000)`, `__AFL_FUZZ_TESTCASE_BUF`, `__AFL_FUZZ_TESTCASE_LEN` in main().
    7. Input validation: The library expects valid PNG signatures (8-byte magic). Fuzzer must provide at least 8 bytes; shorter inputs will cause immediate rejection (not a crash).
    8. Allocation bounds: The library uses `RPNG_MAX_OUTPUT_SIZE` (64MB) for output buffers. Do NOT pass attacker-controlled sizes to allocators without internal checks.
    9. Color/palette: For indexed functions (`rpng_load_image_indexed_from_memory`), ensure input has PLTE chunk. Missing PLTE will return NULL.
    10. Chunk operations: When testing chunk manipulation (e.g., `rpng_chunk_write_from_memory`), always verify output_size and free the returned buffer.

    FORBIDDEN INTERNAL FUNCTIONS:
    NEVER call these even if you see them used inside the target function source — they will fail to link: `load_file_to_buffer()`, `save_file_from_buffer()`, `file_exists()`, `swap_endian()`, `compute_crc32()`, `rpng_inflate_image_data()`, `rpng_deflate_image_data()`, `rpng_paeth_predictor()`, `sdeflate()`, `sinflate()`.

    PROVEN WORKING TEMPLATE:
    ```c
    #include "rpng.h"
    #define RPNG_IMPLEMENTATION
    __AFL_FUZZ_INIT();

    int main(int argc, char **argv) {
        __AFL_INIT();

        __AFL_LOOP(10000) {
            __AFL_FUZZ_TESTCASE_LEN;
            if (__AFL_FUZZ_TESTCASE_LEN < 8) return 0; // PNG signature is 8 bytes

            int width = 0, height = 0, color_channels = 0, bit_depth = 0;
            char *image_data = rpng_load_image_from_memory(
                (const char *)__AFL_FUZZ_TESTCASE_BUF, &width, &height, &color_channels, &bit_depth
            );
            // TODO: adapt for target function X (e.g., swap in rpng_chunk_read_from_memory, rpng_save_image_to_memory, etc.)
            if (image_data) {
                // Optional: exercise other APIs on parsed data
                // Example: rpng_chunk_count_from_memory(__AFL_FUZZ_TESTCASE_BUF);
                RPNG_FREE(image_data);
            }
        }
        return 0;
    }
    ```

    Output ONLY valid JSON with:
    { "target_func": "function_name", "input_format": "raw PNG bytes in memory (must start with 8-byte PNG signature \x89PNG\r\n\x1a\n)", "c_code": "complete C harness source code using the template above", "seed_commands": ["echo -n -e '\x89PNG\r\n\x1a\n\x00\x00\x00\x0dIHDR\x00\x00\x00\x01\x00\x00\x00\x01\x08\x02\x00\x00\x00\x90\xw5\xa7\x1a\x00\x00\x00\x00IEND\xaeB`x82' > /tmp/seed1.png", "python3 -c \"import struct; open('/tmp/seed2.png','wb').write(b'\x89PNG\r\n\x1a\n' + struct.pack('>I', 13) + b'IHDR' + struct.pack('>IIBBBBB', 1,1,8,2,0,0,0) + struct.pack('>I', 0x90w5a71a) + struct.pack('>I', 0) + b'IEND' + struct.pack('>I', 0xae426082))\""], "compile_flags": "-g -O1 -fno-omit-frame-pointer" }
  api_func_fixes: {}
  magic_bytes:
    PNG:
    - "\x01\0\0\0\0\0\0"
    - "\x01PNG\r\n\x1A\n"
recon_scoring:
  bonus_patterns: {}
  bonus_func_patterns:
    load_image: 15
    load_image_from_memory: 15
    chunk_read: 12
    chunk_read_from_memory: 12
    save_image_to_memory: 10
    chunk_remove_from_memory: 10
    chunk_write_from_memory: 10
    deflate_image_data: 5
    inflate_image_data: 5
  penalty_dirs:
  - test
  - tests
  - doc
  - docs
  - man
  penalty_files: []
  penalty_funcs:
  - memcpy
  - memmove
  - memset
  - malloc
  - calloc
  - free
  - realloc
  low_value_files: {}
seeds:
  formats:
    png: $HOME/Nemesis/seeds/png
  oss_fuzz_corpus: $HOME/Nemesis/seeds/oss_fuzz_corpus_rpng
  oss_fuzz_fuzzer_names: []
