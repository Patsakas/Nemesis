            char *compressed = (char *)malloc((size_t)maxCompressedSize);
            if (!compressed) continue;
            int compressedSize = LZ4_compress_default(
                (const char *)input, compressed, (int)srcSize, maxCompressedSize);
            if (compressedSize > 0) {
                /* Example 2: Decompression fuzz target (LZ4_decompress_safe) */
                char *decompressed = (char *)malloc(srcSize);
                if (decompressed) {
                    int decSize = LZ4_decompress_safe(
                        compressed, decompressed, compressedSize, (int)srcSize);
                    /* TODO: adapt for target function X (e.g., LZ4_decompress_safe_partial, LZ4_compress_fast) */
                }
                free(decompressed);
            }
            free(compressed);

            /* TODO: adapt for streaming API (LZ4_createStream / LZ4_compress_continue / LZ4_freeStream) */
        }

        return 0;
    }
