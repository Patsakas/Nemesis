    __AFL_FUZZ_INIT();

    typedef struct {
        const uint8_t *data;
        size_t size;
        size_t offset;
    } mem_buf_t;

    static int32_t mem_read_bytes(void *id, void *data, int32_t bcount) {
        mem_buf_t *buf = (mem_buf_t *)id;
        if (buf->offset + bcount > buf->size) bcount = buf->size - buf->offset;
        if (bcount <= 0) return -1;
        memcpy(data, buf->data + buf->offset, bcount);
        buf->offset += bcount;
        return bcount;
    }

