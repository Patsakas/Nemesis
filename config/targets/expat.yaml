  # CVE-2022-25313 backtest pin. build_node is the recursive helper that walks
  # the DTD content-model scaffold built during DOCTYPE parsing. With deeply
  # nested element content like `<!ELEMENT a ((((((((b))))))))>`, the recursion
  # exhausts the stack. Reachable via XML_Parse on input that starts a DOCTYPE
  # with an <!ELEMENT> declaration.
  pinned_funcs:
    # CVE-2022-25235 — heap buffer overflow when constructing names with
    # certain UTF-8/UTF-16 multi-byte characters. The off-by-one happens
    # in storeRawNames's memcpy, fed by tag->rawNameLength which the
    # encoding converter miscomputed for boundary characters.
    # Type B (malformation IS the trigger) — single-byte craft, AFL with
    # XML magic seeds + havoc should hit it within minutes. No deep
    # recursion needed; no visibility patch needed.
    - func_name: storeRawNames
